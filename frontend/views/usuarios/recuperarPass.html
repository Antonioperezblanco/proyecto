<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="/frontend/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/css/usuario.css">


</head>
<body>
    <div class="row d-flex justify-content-center align-items-center">
        <div class="col-8 mt-5">
            <form action="http://127.0.0.1:3000/pass/solicitar" method="post" class="p-4 border rounded shadow bg-white pt-5 mt-5">
                <div class="container">
                    <label class="form-label">Correo: </label>
                    <div class="row mt-3">
                        <div class="col-6">
                            <input type="email" name="email" id="email" class="form-control" placeholder="Correo">
                        </div>
                        <div class="col-6">
                             <input type="submit" id="submit" value="Buscar" class="btn btn-primary">
                        </div>
                    </div>
                    
                    <span class="text-danger" id="correoErr"></span>
                    
                </div>
                
                <br>
                <span class="mb-4"><a href="./CrearUsuario.html"> &lt; Volver</a> </span>
            </form>
        </div>
    </div>
    <script src="/scripts/usuarios/scriptRecuperar.js"></script>

</body>
</html>
