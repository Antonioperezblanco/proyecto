<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link rel="stylesheet" href="/frontend/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/frontend/css/usuario.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>


</head>
<body>
    <div class="row">
        <div class="container mt-5">
            <div class="col">
                <form method="post" class="p-4 border rounded shadow bg-white" action="http://127.0.0.1:3000/usuario/inicioSesion">
                    <p class="info h2 text-dark">Iniciar Sesión</p>

                    <label class="form-label">¿Cómo iniciar sesión?</label>
                    <br>
                    <input type="button" value="Nombre de usuario" id="btnUsuario" class="btn btn-dark">
                    <input type="button" value="Correo electrónico" id="btnCorreo" class="btn btn-dark">
                    <br>
                    <div class="container mt-2">
                        <label for="registro" id="registroLabel" class="form-label">Nombre de usuario</label>
                        <input type="text" name="nombre" id="registro" class="form-control" placeholder="Nombre de usuario">
                        <span  id="registroErr" class="text-danger"></span>
                        <br>
                    </div>
                    <div class="container">
                        <label class="form-label">Contraseña: </label>
                        <input type="password" name="pass" id="pass" class="form-control" placeholder="Contraseña">
                        <span class="text-danger" id="passErr"></span>
                        <div class="showPass container d-flex justify-content-end align-items-center">
                            <i class="fas fa-eye text-dark" id="show"></i>
                            <span id="mostrarPass">Mostrar contraseña</span>
                            <br>
                        </div>
                    </div>
                    <input type="submit" class="btn btn-primary" value="Iniciar sesión" id="submit">
                    <input type="reset" class="btn btn-secondary">
                    <br>
                    <span>¿No estás registrado aún? <a href="./CrearUsuario.html">Click aquí</a> </span>
                    <span class="recuperar"><a href="./recuperarPass.html">Recuperar contraseña</a></span>
                </form>
            </div>
        </div>
    </div>
</div>    
    <script src="/scripts/usuarios/scriptInicioSesion.js"></script>
</body>
</html>
